name: Validate generated agent/plugin artifacts
on:
  workflow_dispatch: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
    - name: Ensure generated files are up to date
      run: ./scripts/publish.sh --check
